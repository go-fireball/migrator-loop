name: migration-loop-ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  validate-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate scripts syntax
        run: bash -n scripts/*.sh
      - name: Ensure required docs exist
        run: |
          test -f docs/project.yaml
          test -f docs/status/phase-status.yaml
