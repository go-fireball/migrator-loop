$schema: "https://json-schema.org/draft/2020-12/schema"
title: ParityContract
type: object
additionalProperties: false
required:
  - id
  - name
  - status
  - legacy_modules
  - target_apps
  - business_goal
  - parity_scope
  - allowed_modernizations
  - forbidden_changes
  - inputs
  - outputs
  - business_rules
  - edge_cases
  - dependencies
  - validation_approach
  - human_decisions_required
  - parity_result
properties:
  id: { type: string }
  name: { type: string }
  status:
    type: string
    enum: [draft, proposed, needs_human_review, approved, in_progress, validated, rejected]
  legacy_modules: { type: array, items: { type: string } }
  target_apps: { type: array, items: { type: string } }
  business_goal: { type: string }
  parity_scope: { type: string }
  allowed_modernizations: { type: array, items: { type: string } }
  forbidden_changes: { type: array, items: { type: string } }
  inputs: { type: array, items: { type: string } }
  outputs: { type: array, items: { type: string } }
  business_rules: { type: array, items: { type: string } }
  edge_cases: { type: array, items: { type: string } }
  dependencies: { type: array, items: { type: string } }
  validation_approach: { type: array, items: { type: string } }
  human_decisions_required: { type: array, items: { type: string } }
  parity_result:
    type: object
    additionalProperties: false
    required: [status, notes]
    properties:
      status: { type: string, enum: [not_run, pass, fail, partial] }
      notes: { type: string }
