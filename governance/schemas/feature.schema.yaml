$schema: "https://json-schema.org/draft/2020-12/schema"
title: Feature
type: object
additionalProperties: false
required: [id, name, status, objective, parity_contract_ids, stories]
properties:
  id: { type: string }
  name: { type: string }
  status:
    type: string
    enum: [draft, proposed, needs_human_review, approved, in_progress, blocked, done]
  objective: { type: string }
  parity_contract_ids:
    type: array
    items: { type: string }
  stories:
    type: array
    items: { type: string }
